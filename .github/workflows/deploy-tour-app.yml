name: Deploy Tour App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [self_guided_app/**, .github/workflows/deploy-tour-app.yml]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: self_guided_app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: self_guided_app

      - name: Build and deploy
        run: ./deploy.sh
        working-directory: self_guided_app
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DEPLOY_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DEPLOY_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
