name: Deploy Admin Panel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [admin_panel/**, .github/workflows/deploy-admin-panel.yml]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin_panel/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: admin_panel

      - name: Build and deploy
        run: ./deploy.sh
        working-directory: admin_panel
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ADMIN_DEPLOY_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ADMIN_DEPLOY_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_TOUR_APP_URL: ${{ secrets.NEXT_PUBLIC_TOUR_APP_URL }}
          NEXT_PUBLIC_SESSION_KEY: ${{ secrets.NEXT_PUBLIC_ADMIN_SESSION_KEY }}
