name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [backend/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BACKEND_DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKEND_DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Install dependencies
        run: pnpm install
        working-directory: backend

      - name: Add backend node_modules/.bin to PATH
        run: echo "${{ github.workspace }}/backend/node_modules/.bin" >> $GITHUB_PATH

      - name: Build
        run: sam build
        working-directory: backend

      - name: Deploy
        run: sam deploy
        working-directory: backend
