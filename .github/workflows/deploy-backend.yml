name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [backend/**, .github/workflows/deploy-backend.yml]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BACKEND_DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKEND_DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Install dependencies
        run: pnpm install
        working-directory: backend

      - name: Build
        run: sam build
        working-directory: backend

      - name: Deploy
        run: |
          sam deploy \
            --stack-name sport-rent-backend \
            --s3-prefix sport-rent-backend \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --resolve-s3 \
            --region eu-central-1 \
            --parameter-overrides \
              AdminJwtSecret="${{ secrets.ADMIN_JWT_SECRET }}" \
              AdminRefreshSecret="${{ secrets.ADMIN_REFRESH_SECRET }}" \
              TourJwtSecret="${{ secrets.TOUR_JWT_SECRET }}" \
              AdminApiKey="${{ secrets.ADMIN_API_KEY }}" \
              CloudFrontCertArn="${{ secrets.CLOUDFRONT_CERT_ARN }}" \
              GithubDeployToken="${{ secrets.GH_DEPLOY_TOKEN }}" \
              GithubRepo="wooglie/800-sport-rent-self-guiding-tours"
        working-directory: backend
