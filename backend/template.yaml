AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: 800 Sport Rent — Backend API + Admin Panel hosting

Parameters:
  AdminJwtSecret:
    Type: String
    NoEcho: true
    Description: Secret for signing admin access JWTs
  AdminRefreshSecret:
    Type: String
    NoEcho: true
    Description: Secret for signing admin refresh JWTs
  TourJwtSecret:
    Type: String
    NoEcho: true
    Description: Secret for signing tour JWTs
  AdminApiKey:
    Type: String
    NoEcho: true
    Description: API key for bootstrap endpoints
  AdminJwtExpiryMinutes:
    Type: Number
    Default: 15
  AdminRefreshExpiryDays:
    Type: Number
    Default: 30
  TourAppUrl:
    Type: String
    Default: "https://app.sport-rent.800.hr"

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 10
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        ACCESS_TOKENS_TABLE: !Ref AccessTokensTable
        TOURS_TABLE: !Ref ToursTable
        ADMIN_JWT_SECRET: !Ref AdminJwtSecret
        ADMIN_REFRESH_SECRET: !Ref AdminRefreshSecret
        TOUR_JWT_SECRET: !Ref TourJwtSecret
        ADMIN_API_KEY: !Ref AdminApiKey
        ADMIN_JWT_EXPIRY_MINUTES: !Ref AdminJwtExpiryMinutes
        ADMIN_REFRESH_EXPIRY_DAYS: !Ref AdminRefreshExpiryDays
        TOUR_APP_URL: !Ref TourAppUrl

# ─── DynamoDB Tables ──────────────────────────────────────────────────────────

Resources:

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-users"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AccessTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-access-tokens"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAtEpoch
        Enabled: true

  ToursTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-tours"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ─── API Gateway ──────────────────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      StageName: prod
      EndpointConfiguration:
        Type: REGIONAL
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,x-api-key'"
        AllowOrigin: "'*'"
      Auth:
        Authorizers:
          AdminAuthorizer:
            FunctionArn: !GetAtt AdminAuthorizerFunction.Arn
            Identity:
              Header: Authorization
              ReauthorizeEvery: 0
          TourAuthorizer:
            FunctionArn: !GetAtt TourAuthorizerFunction.Arn
            Identity:
              Header: Authorization
              ReauthorizeEvery: 0

  # ─── Lambda Authorizers ───────────────────────────────────────────────────────

  AdminAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-admin-authorizer"
      CodeUri: src/authorizer/
      Handler: admin.handler
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - admin.ts

  TourAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tour-authorizer"
      CodeUri: src/authorizer/
      Handler: tour.handler
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - tour.ts

  AdminAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AdminAuthorizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*"

  TourAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt TourAuthorizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/*"

  # ─── IAM Role ─────────────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !Sub "${UsersTable.Arn}/index/*"
                  - !GetAtt AccessTokensTable.Arn
                  - !GetAtt ToursTable.Arn

  # ─── Auth Functions ───────────────────────────────────────────────────────────

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-auth-login"
      CodeUri: src/functions/auth/login/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/login
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  RefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-auth-refresh"
      CodeUri: src/functions/auth/refresh/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/refresh
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  LogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-auth-logout"
      CodeUri: src/functions/auth/logout/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/logout
            Method: POST
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  # ─── Admin Bootstrap Functions ────────────────────────────────────────────────

  AdminCreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-admin-create-user"
      CodeUri: src/functions/admin/createUser/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/users
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  AdminResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-admin-reset-password"
      CodeUri: src/functions/admin/resetPassword/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/users/{userId}/reset-password
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  # ─── User Functions ───────────────────────────────────────────────────────────

  ListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-users-list"
      CodeUri: src/functions/users/list/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /users
            Method: GET
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-users-create"
      CodeUri: src/functions/users/create/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /users
            Method: POST
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  # ─── Token Functions ──────────────────────────────────────────────────────────

  ValidateTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tokens-validate"
      CodeUri: src/functions/tokens/validate/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /tokens/validate
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  CreateTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tokens-create"
      CodeUri: src/functions/tokens/create/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /tokens
            Method: POST
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  ListTokensFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tokens-list"
      CodeUri: src/functions/tokens/list/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /tokens
            Method: GET
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  TokenStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tokens-stats"
      CodeUri: src/functions/tokens/stats/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /tokens/stats
            Method: GET
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  # ─── Tour Functions ───────────────────────────────────────────────────────────

  ListToursPublicFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tours-list-public"
      CodeUri: src/functions/tours/listPublic/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /tours
            Method: GET
            Auth:
              Authorizer: TourAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  ListToursAdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tours-list-admin"
      CodeUri: src/functions/tours/listAdmin/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/tours
            Method: GET
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  CreateTourFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tours-create"
      CodeUri: src/functions/tours/create/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/tours
            Method: POST
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  UpdateTourFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tours-update"
      CodeUri: src/functions/tours/update/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/tours/{id}
            Method: PUT
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  DeleteTourFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-tours-delete"
      CodeUri: src/functions/tours/delete/
      Handler: handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/tours/{id}
            Method: DELETE
            Auth:
              Authorizer: AdminAuthorizer
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - handler.ts

  # ─── Admin Panel: S3 + CloudFront ─────────────────────────────────────────────

  AdminPanelBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-admin-panel"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AdminPanelOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-admin-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminPanelBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminPanelBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AdminPanelBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminPanelDistribution}"

  AdminPanelDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AdminPanelBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt AdminPanelOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /404.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # ─── API CloudFront Distribution ─────────────────────────────────────────────

  ApiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${Api}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /prod
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: https-only
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad        # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  ApiGatewayUrl:
    Description: Direct API Gateway URL (internal)
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ApiUrl:
    Description: API URL via CloudFront (use this in your apps)
    Value: !Sub "https://${ApiDistribution.DomainName}"

  ApiDistributionId:
    Description: CloudFront distribution ID for API
    Value: !Ref ApiDistribution

  AdminPanelBucketName:
    Description: S3 bucket name for admin panel static files
    Value: !Ref AdminPanelBucket

  AdminPanelDistributionId:
    Description: CloudFront distribution ID for admin panel
    Value: !Ref AdminPanelDistribution

  AdminPanelDomain:
    Description: CloudFront domain for admin panel
    Value: !GetAtt AdminPanelDistribution.DomainName
